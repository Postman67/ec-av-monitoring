global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "obs-exporter"
    static_configs:
      - targets: ["obs-exporter:9121"]
        labels:
          source: "stream-pc"

  - job_name: "shure-exporter"
    static_configs:
      - targets: ["shure-exporter:9122"]
        labels:
          source: "qlxd-receivers"

  - job_name: "companion-exporter"
    static_configs:
      - targets: ["companion-exporter:9123"]
        labels:
          source: "companion"
