version: "3.8"

# EC A/V Monitoring Stack
# Deploy on The Forest Docker Swarm (10.70.0.x network)
# Prometheus + Grafana + 3 exporters (OBS, Shure, Companion)

services:
  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
    networks:
      - monitoring
    deploy:
      placement:
        constraints:
          - node.hostname == docker

  # --- Grafana ---
  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "4000:3000"   # Map to 4000 to avoid conflict with existing Grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-ec-av-2026}"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ec-av-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
    deploy:
      placement:
        constraints:
          - node.hostname == docker

  # --- OBS Exporter ---
  obs-exporter:
    build:
      context: ./exporters
      dockerfile: obs-exporter.Dockerfile
    ports:
      - "9121:9121"
    environment:
      OBS_HOST: "10.50.0.4"
      OBS_PORT: "4455"
      OBS_PASSWORD_FILE: "/run/secrets/obs_ws_pass"
      EXPORTER_PORT: "9121"
      POLL_INTERVAL: "10"
    secrets:
      - obs_ws_pass
    networks:
      - monitoring
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s

  # --- Shure QLXD Exporter ---
  shure-exporter:
    build:
      context: ./exporters
      dockerfile: shure-exporter.Dockerfile
    ports:
      - "9122:9122"
    environment:
      SHURE_METRICS_PORT: "9122"
      SHURE_METER_RATE: "00250"
    networks:
      - monitoring
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s

  # --- Companion Exporter ---
  companion-exporter:
    build:
      context: ./exporters
      dockerfile: companion-exporter.Dockerfile
    ports:
      - "9123:9123"
    environment:
      COMPANION_HOST: "10.50.0.10"
      COMPANION_PORT: "8000"
      COMPANION_METRICS_PORT: "9123"
      COMPANION_POLL_INTERVAL: "10"
    networks:
      - monitoring
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: overlay

secrets:
  obs_ws_pass:
    file: ./secrets/obs_ws_pass
