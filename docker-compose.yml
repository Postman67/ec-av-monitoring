version: "3.8"

# EC A/V Monitoring Stack — The Forest Docker Swarm

services:
  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "4000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "ecav2026"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ec-av-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/prometheus.yml
      - source: grafana_dashboard_provider
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
      - source: grafana_dashboard
        target: /var/lib/grafana/dashboards/ec-av-overview.json
    networks:
      - monitoring

  obs-exporter:
    image: ghcr.io/postman67/ec-av-monitoring/obs-exporter:latest
    ports:
      - "9121:9121"
    environment:
      OBS_HOST: "10.50.0.4"
      OBS_PORT: "4455"
      OBS_PASSWORD: "x0S53niOzxMp7vYu"
      EXPORTER_PORT: "9121"
      POLL_INTERVAL: "10"
    networks:
      - monitoring
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.id == mhvz8xl2bw9ls5iegqfmya6v1

  shure-exporter:
    image: ghcr.io/postman67/ec-av-monitoring/shure-exporter:latest
    ports:
      - "9122:9122"
    environment:
      SHURE_METRICS_PORT: "9122"
      SHURE_METER_RATE: "00250"
    networks:
      - monitoring
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.id == mhvz8xl2bw9ls5iegqfmya6v1

  companion-exporter:
    image: ghcr.io/postman67/ec-av-monitoring/companion-exporter:latest
    ports:
      - "9123:9123"
    environment:
      COMPANION_HOST: "10.50.0.10"
      COMPANION_PORT: "8000"
      COMPANION_METRICS_PORT: "9123"
      COMPANION_POLL_INTERVAL: "10"
    networks:
      - monitoring
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.id == mhvz8xl2bw9ls5iegqfmya6v1

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: overlay

configs:
  prometheus_config:
    external: true
    name: ec_prometheus_config
  grafana_datasource:
    external: true
    name: ec_grafana_datasource
  grafana_dashboard_provider:
    external: true
    name: ec_grafana_dashboards_provider
  grafana_dashboard:
    external: true
    name: ec_grafana_dashboard
